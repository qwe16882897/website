<!DOCTYPE html>
<!-- 创作者个人站正式模板（layout B）。-->
<html lang="zh-CN">
<head>

<title>阿坠懂画画</title>
<link rel="stylesheet" href="image-viewer.css">
<link rel="stylesheet" href="common.css">
<style>
/* ============================================================
   左侧栏式（Left-Sidebar）
   - 左侧固定栏：头像 + 导航 + 联系方式常驻
   - 右侧内容区滚动
   - 移动端侧栏收起为顶部抽屉
   - 主题色由创作者后台统一控制，前端不暴露换肤入口
   ============================================================ */

/* 非饱和度元素统一使用五个阶梯灰阶（参考 Figma 色彩阶梯规范）
   Level 1  #000000  主标题
   Level 2  #333333  正文 / 副标题
   Level 3  #666666  次要文字
   Level 4  #999999  提示 / 辅助
   Level 5  #eeeeee  背景 / 边框 / 分割线
   品牌色（--primary / --accent）保持饱和度不变 */
:root {
  --primary: #77B7FF;
  --accent:  #8FB0D9;
  --radius: 14px;
  --sidebar-w: 266px;
  --sb-avatar-size: calc(127px * 0.88);
  --ease: cubic-bezier(.22,1,.36,1);
  --hg-cell-w: 210px;
  --hg-gap: 27px;
  --depth-card-w: calc(220px * 0.8);
  --depth-card-h: calc(280px * 0.8);
  --depth-gallery-step: calc(240px * 0.8);
  --depth-stage-height: calc(506px * 0.8);
  --title: #000000;      /* Level 1 */
  --text: #333333;       /* Level 2 */
  --muted: #666666;      /* Level 3 */
  --hint: #999999;       /* Level 4 */
  --bg: #F5F6F7;         /* Level 5 页面灰底 */
  --surface: rgba(255, 255, 255, 0.96);
  --border: #F4F5F6;     /* Level 5 */
  --shadow: 0 8px 30px rgba(0,0,0,0.06);
  --bg-image: none;
  /* 接单状态标签 — 成功绿，代表在线可接单 */
  --status-color: #22C55E;
  --status-text: var(--status-color);
  --status-dot: var(--status-color);
}

/* 深色模式：灰阶反白（品牌色 / 状态色不变），背景 #181818 */
html[data-theme="dark"] {
  --title: rgba(255, 255, 255, 0.9);
  --text: rgba(255, 255, 255, 0.7);
  --muted: rgba(255, 255, 255, 0.5);
  --hint: #737373;
  --bg: #181818;
  --surface: rgba(34, 34, 34, 0.7);
  --border: #333333;
  --border-hover: color-mix(in srgb, #333333 92%, #ffffff 8%);
  --shadow: 0 8px 28px rgba(0, 0, 0, 0.32);
}

html[data-theme="dark"] .card {
  box-shadow: 0 2px 14px rgba(0, 0, 0, 0.22);
}
html[data-theme="dark"] .card:hover {
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.36);
}
html[data-theme="dark"] .grid-wrap--horizontal-gallery .card,
html[data-theme="dark"] .grid-wrap--horizontal-gallery .card:hover,
html[data-theme="dark"] .grid--regular-grid .card,
html[data-theme="dark"] .grid--regular-grid .card:hover,
html[data-theme="dark"] .memory-stickers-sheet .card,
html[data-theme="dark"] .memory-stickers-sheet .card:hover {
  box-shadow: none;
}
html[data-theme="dark"] .sb-avatar {
  box-shadow: none;
}

/* ---------- 布局 ---------- */
.layout { display: flex; min-height: 100vh; overflow-x: hidden; }

/* ---------- 左侧固定栏 ---------- */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  position: fixed; left: 0; top: 0; height: 100vh;
  background: var(--surface);
  display: flex; flex-direction: column; padding: 36px 28px;
  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.sidebar::-webkit-scrollbar {
  display: none;
  width: 0;
  height: 0;
}

html[data-theme="dark"] .sidebar {
  background: rgba(27, 27, 27, 0.82);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}
html[data-theme="dark"] .sb-contact { border-top-color: rgba(255,255,255,0.05); }
.sb-avatar {
  width: var(--sb-avatar-size); height: var(--sb-avatar-size); flex-shrink: 0;
  border-radius: 50%; overflow: hidden;
  background: var(--bg);
}
.sb-avatar.avatar--square { border-radius: 2px; }
.sb-avatar.avatar--portrait {
  width: var(--sb-avatar-size);
  height: auto;
  aspect-ratio: 5 / 6;
  border-radius: 2px;
}
.sb-avatar img { width: 100%; height: 100%; object-fit: cover; }

.sb-profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
  margin-bottom: 4px;
}

.sb-avatar-wrap {
  position: relative;
  display: inline-flex;
  justify-content: center;
  margin-bottom: calc(40px * 0.8);
  overflow: visible;
}
.sb-avatar-wrap.avatar-wrap--no-wait {
  margin-bottom: calc(30px * 0.8);
}
.sb-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  width: 100%;
  text-align: center;
  margin-top: -4px;
  color: var(--title);
  line-height: 1.3;
  white-space: normal;
  word-break: break-word;
  overflow: hidden;
  max-height: 2.6em;
}
.sb-role {
  color: var(--text);
  font-size: 14px;
  margin-top: 4px;
  margin-bottom: 18px;
  width: 100%;
  text-align: center;
  line-height: 1.5;
  word-break: break-word;
  overflow-wrap: break-word;
}
.sb-status {
  cursor: default;
  user-select: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  width: fit-content;
  max-width: 100%;
  box-sizing: border-box;
  --status-tag-pad-y: 6px;
  --status-tag-pad-x: 12px;
  padding: var(--status-tag-pad-y) var(--status-tag-pad-x);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  line-height: 1;
  background: #ffffff;
  border: 1px solid var(--status-color);
  color: var(--status-text);
  margin-bottom: 28px;
  white-space: nowrap;
}
.status-tag__main {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
}
.status-tag__main .dot { margin-right: 4px; }
.status-tag__sep {
  width: 1px;
  height: 0.85em;
  background: currentColor;
  opacity: 0.35;
  flex-shrink: 0;
  margin: 0 5px;
}
.status-tag__wait {
  font-size: inherit;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0.88;
}

.sb-status--hero {
  position: absolute;
  bottom: calc(-15px * 0.8);
  left: 50%;
  transform: translateX(-50%);
  margin-bottom: 0;
  max-width: none;
}
.sb-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-dot); animation: pulse 1.2s infinite; flex-shrink: 0; }
.sb-status.is-closed {
  color: #999999;
  --status-dot: var(--hint);
  background: #ffffff;
  border-color: #999999;
}
.sb-status.is-closed .dot { animation: none; opacity: 0.45; }
.sb-status-wrap { margin-bottom: 4px; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.sb-nav { display: flex; flex-direction: column; gap: 1px; margin-top: 10px; width: 190px; align-self: center; }
.sb-nav a {
  padding: 10px 14px; border-radius: 10px; font-size: 16px; color: var(--muted);
  font-weight: 400; transition: color .2s; display: flex; align-items: center; justify-content: flex-start;
  width: max-content; max-width: 100%; text-align: left; box-sizing: border-box;
  white-space: nowrap;
  flex: 0 0 auto;
}
.sb-nav a:hover { color: var(--primary); background: transparent; }
.sb-nav a.active { color: var(--primary); background: transparent; font-weight: 600; }

.sb-contact { margin-top: auto; padding-top: 24px; border-top: 1px solid #e8e8e8; text-align: left; }
.sb-contact .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
.sb-contact-icons {
  display: flex;
  flex-direction: row;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
}
.sb-contact-icons .sidebar-contact-icon {
  display: block;
  width: 29px;
  height: 29px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  font: inherit;
  opacity: 0.8;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.sb-contact-icons .sidebar-contact-icon.contact-icon--custom {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
}
.sb-contact-icons a.sidebar-contact-icon:hover,
.sb-contact-icons button.sidebar-contact-icon:hover {
  opacity: 0.88;
  transform: translateY(-1px);
}
html[data-theme="dark"] .sb-contact-icons .sidebar-contact-icon {
  transform: scale(0.9);
}
html[data-theme="dark"] .sb-contact-icons a.sidebar-contact-icon:hover,
html[data-theme="dark"] .sb-contact-icons button.sidebar-contact-icon:hover {
  transform: scale(0.9) translateY(-1px);
}
.sb-contact-icons .social-icon-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.site-copy-toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  padding: 10px 18px;
  border-radius: 8px;
  background: rgba(20, 20, 20, 0.92);
  color: #fff;
  font-size: 14px;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
}
.site-copy-toast.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.sb-socials { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; align-items: flex-start; }
.sb-socials a.social-link {
  display: block;
  width: 25.6px;
  height: 25.6px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.sb-socials a.social-link:hover { opacity: 0.88; transform: translateY(-6px); }
.sb-socials .social-icon-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sb-socials a:not(.social-link) { font-size: 13px; color: var(--muted); }
.sb-socials a:not(.social-link):hover { color: var(--primary); }

/* 主内容区联系模块（与界面框架 A 内容一致） */
.contact-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 44px 24px; transition: box-shadow .35s var(--ease), border-color .32s ease; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
.contact-block:hover { box-shadow: 0 2px 22px rgba(0, 0, 0, 0.05); }
.contact-intro {
  text-align: center;
  color: var(--title);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-top: -18px;
  margin-bottom: 18px;
  transition: color 0.3s ease;
}
.contact-block:hover .contact-intro { color: var(--title); }
html[data-theme="dark"] .contact-block:hover .contact-intro { color: var(--title); }
.contact-methods-b.contact-methods--icons,
.contact-methods.contact-methods--icons {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
  margin-top: -4px;
  transform: translateY(6px);
}
.contact-social-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 75px;
}
.contact-social-label {
  font-size: 12px;
  line-height: 1.2;
  color: var(--muted);
  white-space: normal;
  word-break: break-word;
  text-align: center;
  margin-top: 4px;
  max-width: 100%;
  transition: color 0.3s ease;
}
.contact-social-item:hover .contact-social-label {
  color: var(--title);
}
.contact-methods--icons .contact-row-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 6px;
  transition: opacity 0.2s, transform 0.2s;
  color: inherit;
  text-decoration: none;
}
.contact-methods--icons .contact-row-icon:hover {
  opacity: 0.88;
  transform: translateY(-4px);
}
.contact-methods--icons .social-icon-img,
.contact-methods--icons .contact-icon-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.sb-socials:empty { display: none; margin: 0; }
.cm { display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px; border-radius: 999px; font-size: 15px; font-weight: 500; }
.contact-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border-radius: 6px;
  background: #333333;
}
.contact-icon svg { display: block; width: 20px; height: 20px; }
.contact-icon--png { padding: 0; background: transparent; overflow: hidden; border-radius: 6px; }
.contact-icon-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cm .cm-value { line-height: 1.2; }
.cm.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

/* ---------- 右侧内容 ---------- */
.content {
  flex: 1 1 0%;
  min-width: 0;
  padding: 44px 56px;
  margin-left: var(--sidebar-w);
  --content-pad-x: 56px;
  box-sizing: border-box;
}
.sec { margin-bottom: 56px; width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; }
.sec--last-visible { margin-bottom: 0; padding-bottom: 100px; }
#terms:not(.sec--last-visible) { margin-bottom: 0; }
#works { min-width: 0; max-width: 100%; padding-top: 24px; }
#works:has(.grid--3d-depth-gallery) .depth-gallery-stage { margin-bottom: 30px; }
#terms,
#contact {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  box-sizing: border-box;
}
#terms { margin-bottom: 0; }
#contact { margin-bottom: 0; padding-bottom: 100px; }
.sec-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
.site-block-title {
  font-size: 22px;
}
.terms-sub > .site-block-title {
  margin-bottom: 14px;
}

.intro h1 { font-size: 34px; letter-spacing: -0.02em; margin-bottom: 12px; }
.intro p { color: var(--muted); font-size: 17px; max-width: 600px; }

/* 作品墙 */
.tabs { margin-bottom: 20px; }
html[data-theme="dark"] .tab:not(.active) { background: rgba(34, 34, 34, 0.5); border-color: rgba(255, 255, 255, 0.3); }
html[data-theme="dark"] .tab:not(.active):hover { color: #ffffff; }
html[data-theme="dark"] .tab.active { background: var(--primary); color: #fff; }
.grid { display: grid; gap: 18px; }
.grid--regular-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
.grid--memory-stickers {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.memory-stickers-sheet {
  display: grid;
  grid-template-columns: repeat(4, minmax(140px, 1fr));
  grid-auto-rows: auto;
  gap: 18px;
  align-items: start;
}
.memory-stickers-sheet .card {
  display: flex;
  flex-direction: column;
  align-self: start;
  width: 100%;
  min-height: 0;
}
.memory-stickers-sheet .card--featured {
  align-self: stretch;
  height: 100%;
}
.memory-stickers-sheet .card--featured .card-img {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  aspect-ratio: auto;
  height: auto;
}
.memory-stickers-sheet .card--featured .card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.memory-stickers-sheet .card--featured .card-footer {
  flex: 0 0 auto;
}
/* 回忆墙拍立得：大卡片用 aspect-ratio 1:1.2 控制比例，图片区 1:1，footer 撑满剩余 */
.memory-stickers-sheet .card--featured.card--polaroid {
  height: auto;
  align-self: start;
}
.memory-stickers-sheet .card--featured.card--polaroid .card-img {
  flex: 0 0 auto;
  aspect-ratio: 1 / 1;
  height: auto;
}
.memory-stickers-sheet .card--featured.card--polaroid .card-footer {
  flex: 1 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}
.memory-stickers-sheet .card--featured .card-title { font-size: 17px; }
.grid-wrap { overflow: visible; padding-top: 8px; }
/* 画廊：左右贴齐 .content 内边缘（仅 #works） */
#works .grid-wrap--horizontal-gallery {
  overflow: hidden;
  position: relative;
  margin-inline: calc(-1 * var(--content-pad-x, 56px));
  width: calc(100% + 2 * var(--content-pad-x, 56px));
  padding-top: 0;
}
#works .horizontal-gallery-viewport {
  width: 100%;
  overflow: hidden;
  padding-top: 12px;
  box-sizing: border-box;
}
.grid--horizontal-gallery {
  display: block;
  width: 100%;
}
.horizontal-gallery-viewport {
  width: 100%;
  overflow: hidden;
  cursor: default;
  touch-action: pan-y;
  padding-top: 12px;
  box-sizing: border-box;
}
.horizontal-gallery-track {
  display: flex;
  width: max-content;
  will-change: transform;
}
.horizontal-gallery-matrix {
  display: flex;
  flex-direction: column;
  gap: var(--hg-gap, 27px);
  flex-shrink: 0;
  padding-right: var(--hg-gap, 27px);
}
.horizontal-gallery-row {
  display: flex;
  gap: var(--hg-gap, 27px);
  flex-shrink: 0;
}
.horizontal-gallery-row .card {
  flex: 0 0 var(--hg-cell-w, 140px);
  width: var(--hg-cell-w, 140px);
  box-shadow: none;
}

/* ---------- 3D 景深画廊 ---------- */
/* 框架B：画廊仅占内容区域，不跨越侧栏底层 */
.depth-gallery-stage {
  position: relative;
  width: 100%;
  left: 0;
  height: var(--depth-stage-height);
  overflow: visible;
  perspective: 1200px;
  cursor: grab;
  user-select: none;
  transform: scale(1.1);
  transform-origin: center center;
}
.depth-gallery-stage:active { cursor: grabbing; }
.depth-gallery-track {
  position: absolute;
  top: calc(50% + 10px);
  left: 50%;
  width: 0;
  height: 0;
  transform-style: preserve-3d;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.depth-gallery-card {
  position: absolute;
  top: 50%;
  left: 50%;
  width: var(--depth-card-w);
  height: var(--depth-card-h);
  margin-top: calc(var(--depth-card-h) * -0.5);
  margin-left: calc(var(--depth-card-w) * -0.5);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 14px rgba(0, 0, 0, 0.05);
  transition: none;
  will-change: transform, filter;
  background: #222;
  backface-visibility: hidden;
}
.depth-gallery-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
/* 3D 画廊拍立得：与常规拍立得卡片样式一致 */
.depth-gallery-card.depth-gallery-card--polaroid {
  background: var(--surface);
  border-radius: 6px;
  padding: calc(7px * 0.8) calc(7px * 0.8) 0 calc(7px * 0.8);
  box-shadow: 0 2px 14px rgba(0, 0, 0, 0.05);
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  overflow: visible;
  aspect-ratio: 1 / 1.2;
  margin-top: calc(var(--depth-card-w) * -0.6);
}
.depth-gallery-card--polaroid .card-img {
  aspect-ratio: 1 / 1;
  width: 100%;
  overflow: hidden;
  border-radius: 4px;
  background: var(--surface);
  flex-shrink: 0;
}
.depth-gallery-card--polaroid .card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  border-radius: 2px;
}
.depth-gallery-card--polaroid .card-footer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 calc(6px * 0.8) calc(8px * 0.8);
  min-height: 0;
  text-align: center;
  box-sizing: border-box;
  background: var(--surface);
}
.depth-gallery-card--polaroid .card-title {
  margin: 0;
  font-size: calc(12px * 0.8);
  font-weight: 500;
  line-height: 1.35;
}
/* 深色模式下 3D 画廊拍立得 100% 不透明 */
html[data-theme="dark"] .depth-gallery-card--polaroid {
  background: #222222;
}
html[data-theme="dark"] .depth-gallery-card--polaroid .card-img {
  background: #222222;
}
html[data-theme="dark"] .depth-gallery-card--polaroid .card-footer {
  background: #222222;
}
.grid-wrap--3d-depth-gallery,
.grid-wrap:has(.grid--3d-depth-gallery),
#works:has(.grid--3d-depth-gallery) .grid-wrap {
  width: 100%;
  overflow: hidden;
  padding-top: 0;
}

.grid--3d-depth-gallery { display: block; width: 100%; overflow: visible; }

/* 3D 画廊相关元素：内容区裁切防止卡片侵入侧栏 */

.grid-wrap--horizontal-gallery .card:hover {
  transform: translateY(-4px);

}
/* 作品卡片：白底相框 7px + 6px 圆角 */
.card {
  background: var(--surface);
  border-radius: 6px;
  padding: 7px;

  aspect-ratio: 1 / 1.2;
  display: flex;
  flex-direction: column;

  box-sizing: border-box;
}
/* 卡片样式：无白底，2px 圆角，悬浮底部蒙层 */
.card--card {
  padding: 0;
  background: transparent;
  border-radius: 6px;
  box-shadow: 0 2px 14px rgba(0, 0, 0, 0.05);
  overflow: hidden;
  aspect-ratio: auto;
  display: block;
}
.card--card .card-img {
  aspect-ratio: 5 / 6;
  border-radius: 6px;
  position: relative;
  background: transparent;
}
.card--card .card-img img { border-radius: 6px; }
.card--card .card-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 34px;
  background: rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.card--card:hover .card-overlay { opacity: 1; }
.card--card .card-overlay .card-title {
  margin: 0;
  padding: 0 8px;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.2;
  color: #fff;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.card--card.card--featured .card-overlay .card-title { font-size: 17px; }
.card--featured .card-title { font-size: 17px; }
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}
/* 缓慢放大悬停效果 */
.hover-anim--slow-zoom .card:hover { transform: none; box-shadow: none; }
.hover-anim--slow-zoom .card-img img { transition: transform 0.5s ease; }
.hover-anim--slow-zoom .card:hover .card-img img { transform: scale(1.03); }

/* 三维跟踪：卡片跟随鼠标 3D 倾斜 */
.hover-anim--track-3d .grid-wrap--horizontal-gallery,
.hover-anim--track-3d .grid-wrap:not(.grid-wrap--horizontal-gallery) {
  perspective: 200px;
}
.hover-anim--track-3d .card {
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  transform-style: preserve-3d;
  will-change: transform;
}
.hover-anim--track-3d .card:hover { transform: none; box-shadow: none; }
.card-img {
  aspect-ratio: 1 / 1;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 4px;
  background: var(--surface);
}
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-img--placeholder { background: #D8DCE3; }
html[data-theme="dark"] .card-img--placeholder { background: #3A3F48; }
.card-footer {
  padding: 12px 6px;
  min-height: calc(1.35em + 15px);
  text-align: center;
  box-sizing: border-box;
}
.card-title {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-sub {
  margin: 4px 0 0;
  font-size: 12px;
  line-height: 1.3;

}

/* 擅长 / 委托规则 · 双列卡片 */
.caps,
.terms {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
.caps.grid-pair,
.terms.grid-pair { grid-template-columns: 1fr 1fr; }
.cap,
.term {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: box-shadow .35s var(--ease), border-color .32s ease;
  height: 100%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  -webkit-backdrop-filter: blur(10px);

}
.cap:hover,
.term:hover,
.status-card:hover,
.terms-info-module-card:hover { box-shadow: 0 2px 22px rgba(0, 0, 0, 0.05); }
.cap h3,
.term h3 { font-size: 16px; margin: 0 0 8px 0; color: var(--title); }
.cap.can h3 { color: var(--title); }
.term h3 { color: var(--title); }
.cap.cannot h3 { color: var(--title); }
.cap:hover h3,
.term:hover h3,
.cap.cannot:hover h3 { color: var(--title); }
html[data-theme="dark"] .cap:hover h3,
html[data-theme="dark"] .term:hover h3,
html[data-theme="dark"] .cap.cannot:hover h3 { color: var(--title); }
.cap:hover p,
.term:hover p,
.cap.cannot:hover p,
html[data-theme="dark"] .cap:hover p,
html[data-theme="dark"] .term:hover p,
html[data-theme="dark"] .cap.cannot:hover p { color: var(--title); }
.cap p { color: var(--muted); font-size: 14px; margin: 0; flex: 1; line-height: 1.55; transition: color 0.3s ease; }

.term p { color: var(--muted); font-size: 14px; margin: 0; flex: 1; line-height: 1.55; transition: color 0.3s ease; word-break: break-word; overflow-wrap: break-word; }

/* ---------- 交易委托 · 三子块 ---------- */
.terms-sub[id] { scroll-margin-top: 80px; }
.terms-info-module-card {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  transition: box-shadow .35s var(--ease);
}
.terms-info-module-card p {
  white-space: pre-wrap;

}
.terms-info-module-card:hover p {
  color: var(--title);
}
.terms-status-detail {
  width: 100%;
}
.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  width: 100%;
  transition: box-shadow .35s var(--ease), border-color .32s ease;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.status-card:hover .status-card__title,
.status-card:hover .status-card__desc {
  color: var(--title);
}
.status-card__title {
  font-size: 16px;
  font-weight: 600;
  color: var(--title);
  margin: 0;
  letter-spacing: -0.01em;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.status-card__desc {
  font-size: 14px;
  color: var(--muted);

  flex: 1;
  min-width: 0;

}
.status-card__desc .wait-number { color: var(--title); }
.status-card.is-closed .status-card__title { color: var(--muted); }

.status-card:not(.is-closed) {
  --status-card-dot: var(--status-color);
}
.status-card.is-closed {
  --status-card-dot: var(--hint);
}
.status-card__title::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--status-card-dot, var(--status-color));
  flex-shrink: 0;
}
.status-card:not(.is-closed) .status-card__title::before {
  animation: pulse-glow 1.8s infinite ease-in-out;
}
.status-card.is-closed .status-card__title::before {
  animation: none;
  opacity: 0.45;
}
@keyframes pulse-glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px 1px rgba(76, 175, 80, 0.45); }
  50% { opacity: 0.6; box-shadow: 0 0 12px 3px rgba(76, 175, 80, 0.15); }
}

html[data-theme="dark"] .cap:hover,
html[data-theme="dark"] .term:hover,
html[data-theme="dark"] .status-card:hover,
html[data-theme="dark"] .contact-block:hover {
  border-color: var(--border-hover);
  box-shadow: none;
}

<script>
(function () {
  // 移动端抽屉
  var sidebar = document.getElementById('sidebar');
  var burger = document.getElementById('burger');
  var overlay = document.getElementById('mobileOverlay');
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  if (burger && sidebar && overlay) {
    burger.addEventListener('click', function () { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); });
    overlay.addEventListener('click', closeSidebar);
  }

  // 导航高亮 + 平滑滚动后收起移动抽屉（渲染完成后会过滤已隐藏项）
  var links = [];
  var sections = [];

  function refreshNav() {
    links = [].slice.call(document.querySelectorAll('.sb-nav a')).filter(function (l) { return !l.hidden; });
    sections = links.map(function (l) { return document.querySelector(l.getAttribute('href')); });
  }
  refreshNav();

  var navLockIndex = null;
  var navUnlockTimer = null;
  var clickLockIndex = null;
  var userScrollIntent = false;

  function markUserScrollIntent() {
    userScrollIntent = true;
  }
  window.addEventListener('wheel', markUserScrollIntent, { passive: true });
  window.addEventListener('touchmove', markUserScrollIntent, { passive: true });

  function sectionDocTop(el) {
    if (!el) return Infinity;
    return el.getBoundingClientRect().top + (window.scrollY || document.documentElement.scrollTop || 0);
  }

  function isMobileShell() {
    return window.matchMedia('(max-width: 860px)').matches;
  }

  function navScrollOffset() {
    return isMobileShell() ? 80 : 24;
  }

  function scrollToNavTarget(link) {
    var href = link.getAttribute('href');
    if (!href || href.charAt(0) !== '#') return;
    if (href === '#about') {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    var target = document.querySelector(href);
    if (!target) return;
    var y = target.getBoundingClientRect().top + window.scrollY - navScrollOffset();
    window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
  }

  function setActiveIndex(idx) {
    links.forEach(function (l, i) { l.classList.toggle('active', i === idx); });
  }

  function unlockNavSpy() {
    navLockIndex = null;
    onScroll();
  }

  function scheduleNavUnlock() {
    clearTimeout(navUnlockTimer);
    var done = false;
    function finish() {
      if (done) return;
      done = true;
      clearTimeout(navUnlockTimer);
      window.removeEventListener('scrollend', finish);
      unlockNavSpy();
    }
    if ('onscrollend' in window) {
      window.addEventListener('scrollend', finish, { once: true });
      navUnlockTimer = setTimeout(finish, 1200);
    } else {
      navUnlockTimer = setTimeout(finish, 450);
    }
  }

  // 事件委托：动态添加的 trade-nav 链接也能响应
  document.querySelectorAll('.sb-nav').forEach(function (sbNav) {
    sbNav.addEventListener('click', function (e) {
      var link = e.target.closest('a');
      if (!link) return;
      var href = link.getAttribute('href');
      if (href && href.charAt(0) === '#') {
        e.preventDefault();
        scrollToNavTarget(link);
      }
      closeSidebar();
      refreshNav();
      var clickedIdx = links.indexOf(link);
      if (clickedIdx < 0) {
        links.forEach(function (l, j) { if (l === link) clickedIdx = j; });
      }
      if (clickedIdx < 0) clickedIdx = 0;
      userScrollIntent = false;
      clickLockIndex = clickedIdx;
      navLockIndex = clickedIdx;
      setActiveIndex(clickedIdx);
      scheduleNavUnlock();
    });
  });

  // 异步渲染完成后重新刷新导航列表
  document.addEventListener('site-render-complete', function () {
    refreshNav();
  });

  function lastVisibleSectionIndex() {
    for (var i = sections.length - 1; i >= 0; i--) {
      if (sections[i] && !sections[i].hidden) return i;
    }
    return sections.length - 1;
  }

  function resolveActiveIndexFromScroll() {
    var offset = 80;
    var scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    var probe = scrollY + offset;
    var idx = 0;
    var bestTop = -Infinity;
    sections.forEach(function (s, i) {
      if (!s || s.hidden) return;
      var top = sectionDocTop(s);
      if (top <= probe && top > bestTop) {
        bestTop = top;
        idx = i;
      }
    });
    var maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    if (maxScroll - scrollY <= 16 && sections.length > 0) {
      var lastIdx = lastVisibleSectionIndex();
      var lastEl = sections[lastIdx];
      if (lastEl) {
        var rect = lastEl.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > offset) {
          return lastIdx;
        }
      }
    }
    return idx;
  }

  function onScroll() {
    refreshNav();
    if (navLockIndex !== null) {
      setActiveIndex(navLockIndex);
      return;
    }
    if (clickLockIndex !== null) {
      if (!userScrollIntent) {
        setActiveIndex(clickLockIndex);
        return;
      }
      clickLockIndex = null;
    }
    setActiveIndex(resolveActiveIndexFromScroll());
  }
  window.addEventListener('scroll', onScroll);
  document.addEventListener('site-render-complete', function () {
    refreshNav();
    if (clickLockIndex === null) onScroll();
  });

  // 兜底：导出包模式下 site-render-complete 在此脚本执行前已发出
  if (window.DEMO_SITE) {
    refreshNav();
    if (clickLockIndex === null) onScroll();
  }

})();
</script>
